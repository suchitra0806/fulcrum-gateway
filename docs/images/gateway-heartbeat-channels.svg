<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="13">
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="860" height="400" fill="#0f1923" rx="12"/>

  <!-- ══ LEFT COLUMN: Agent Runtime ══ -->
  <rect x="20" y="20" width="300" height="360" rx="10" fill="#1a2535" stroke="#2d4a6b" stroke-width="1.5"/>
  <text x="170" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="0.1em" font-weight="600">AGENT RUNTIME</text>
  <text x="170" y="65" text-anchor="middle" fill="#64748b" font-size="10">(agent-bound token)</text>

  <!-- ADR-007 signals label inside agent -->
  <text x="38" y="102" fill="#4ade80" font-size="11" font-weight="600">ADR-007 registry signals:</text>
  <text x="38" y="122" fill="#4ade80" font-size="11">  effective_state</text>
  <text x="38" y="139" fill="#4ade80" font-size="11">  last_seen_at</text>
  <text x="38" y="156" fill="#4ade80" font-size="11">  sse_connected</text>
  <text x="38" y="173" fill="#4ade80" font-size="11">  external_runtime_state</text>

  <!-- divider -->
  <line x1="38" y1="192" x2="302" y2="192" stroke="#2d4a6b" stroke-width="1"/>

  <!-- ADR-009 heartbeats label inside agent -->
  <text x="38" y="215" fill="#fbbf24" font-size="11" font-weight="600">ADR-009 platform heartbeats:</text>
  <text x="38" y="235" fill="#fbbf24" font-size="11">  status=connected  (every 30s)</text>
  <text x="38" y="252" fill="#fbbf24" font-size="11">  status=stale</text>
  <text x="38" y="269" fill="#fbbf24" font-size="11">  status=offline</text>
  <text x="38" y="286" fill="#fbbf24" font-size="11">  status=setup_error</text>
  <text x="38" y="315" fill="#94a3b8" font-size="10" font-style="italic">  agent-bound token required</text>
  <text x="38" y="331" fill="#94a3b8" font-size="10" font-style="italic">  user token → 400 rejected</text>

  <!-- ══ RIGHT COLUMN: Gateway Registry (top) ══ -->
  <rect x="520" y="20" width="320" height="170" rx="10" fill="#1a2535" stroke="#2d4a6b" stroke-width="1.5"/>
  <text x="680" y="48" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="0.1em" font-weight="600">GATEWAY REGISTRY</text>
  <text x="680" y="65" text-anchor="middle" fill="#64748b" font-size="10">(local · operator-only)</text>

  <text x="538" y="92" fill="#4ade80" font-size="11">Derives: liveness · presence</text>
  <text x="538" y="109" fill="#4ade80" font-size="11">         confidence · reachability</text>
  <text x="538" y="133" fill="#64748b" font-size="10" font-style="italic">Platform cannot see this registry.</text>
  <text x="538" y="149" fill="#64748b" font-size="10" font-style="italic">Visible only to the operator</text>
  <text x="538" y="165" fill="#64748b" font-size="10" font-style="italic">running this Gateway instance.</text>

  <!-- ══ RIGHT COLUMN: aX Platform (bottom) ══ -->
  <rect x="520" y="210" width="320" height="170" rx="10" fill="#1a1f35" stroke="#3d2a6b" stroke-width="1.5"/>
  <text x="680" y="238" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="0.1em" font-weight="600">aX PLATFORM</text>
  <text x="680" y="255" text-anchor="middle" fill="#64748b" font-size="10">(paxai.app · global)</text>

  <text x="538" y="282" fill="#fbbf24" font-size="11">Agent presence: IDLE · ACTIVE</text>
  <text x="538" y="299" fill="#fbbf24" font-size="11">                OFFLINE · ERROR</text>
  <text x="538" y="323" fill="#64748b" font-size="10" font-style="italic">Visible to all space members,</text>
  <text x="538" y="339" fill="#64748b" font-size="10" font-style="italic">other agents, and the aX web UI.</text>
  <text x="538" y="358" fill="#64748b" font-size="10" font-style="italic">Platform sees agents, not the</text>
  <text x="538" y="374" fill="#64748b" font-size="10" font-style="italic">Gateway managing them.</text>

  <!-- ══ Arrow: Agent → Gateway Registry (ADR-007) ══ -->
  <line x1="322" y1="140" x2="516" y2="105" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="368" y="103" width="70" height="22" rx="6" fill="#0f2d1f" stroke="#4ade80" stroke-width="1"/>
  <text x="403" y="118" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">ADR-007</text>

  <!-- ══ Arrow: Agent → aX Platform (ADR-009) ══ -->
  <line x1="322" y1="265" x2="516" y2="295" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <rect x="368" y="265" width="70" height="22" rx="6" fill="#2d1f00" stroke="#fbbf24" stroke-width="1"/>
  <text x="403" y="280" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">ADR-009</text>
</svg>
