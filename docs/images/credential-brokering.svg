<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Credential brokering</title>
  <desc id="desc">Diagram showing Gateway sitting between agent and platform. The agent authenticates with a session token to Gateway, which attaches the real credential to proxied API calls. The agent never sees the real credential.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#22C55E"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, system-ui, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px Inter, system-ui, sans-serif; fill: #94A3B8; }
      .label { font: 700 22px Inter, system-ui, sans-serif; fill: #E2E8F0; }
      .body { font: 500 16px Inter, system-ui, sans-serif; fill: #CBD5E1; }
      .small { font: 600 13px Inter, system-ui, sans-serif; fill: #93C5FD; letter-spacing: 0.08em; text-transform: uppercase; }
      .mono { font: 600 14px 'SFMono-Regular', Consolas, monospace; fill: #DBEAFE; }
      .note { font: 500 14px Inter, system-ui, sans-serif; fill: #94A3B8; }
      .good { font: 600 14px Inter, system-ui, sans-serif; fill: #86EFAC; }
      .bad { font: 600 14px Inter, system-ui, sans-serif; fill: #FCA5A5; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="72" y="72" class="title">Credential Brokering</text>
  <text x="72" y="104" class="subtitle">The agent never touches the real credential. Gateway attaches it to proxied API calls.</text>

  <!-- AGENT BOX -->
  <rect x="60" y="150" width="280" height="240" rx="24" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="92" y="188" class="small">Agent process</text>
  <text x="92" y="222" class="label">Local Agent</text>

  <rect x="92" y="248" width="216" height="48" rx="14" fill="#0B1220" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="112" y="278" class="mono">axgw_s_... (session)</text>

  <text x="92" y="326" class="good">Has: session token</text>
  <text x="92" y="350" class="bad">No: real credential</text>
  <text x="92" y="374" class="bad">No: user PAT</text>

  <!-- GATEWAY BOX (center) -->
  <rect x="420" y="140" width="360" height="300" rx="28" fill="#111827" stroke="#7CE7DD" stroke-width="2.5"/>
  <text x="460" y="180" class="small" style="fill:#7CE7DD;">Local control plane</text>
  <text x="460" y="216" class="label">Gateway</text>

  <!-- Token storage inside Gateway -->
  <rect x="460" y="244" width="280" height="60" rx="16" fill="#0B1220" stroke="#22C55E" stroke-width="1.5"/>
  <text x="484" y="270" class="mono" style="fill:#86EFAC;">~/.ax/gateway/agents/</text>
  <text x="484" y="290" class="mono" style="fill:#86EFAC;">  &lt;name&gt;/token (mode 600)</text>

  <!-- Gateway actions -->
  <text x="460" y="336" class="body">1. Verify session token</text>
  <text x="460" y="362" class="body">2. Look up real credential</text>
  <text x="460" y="388" class="body">3. Attach to API request</text>
  <text x="460" y="414" class="body">4. Forward to platform</text>

  <!-- PLATFORM BOX -->
  <rect x="860" y="150" width="280" height="240" rx="24" fill="#0F172A" stroke="#2563EB" stroke-width="2"/>
  <text x="892" y="188" class="small">Upstream</text>
  <text x="892" y="222" class="label">aX Platform</text>

  <rect x="892" y="248" width="216" height="48" rx="14" fill="#0B1220" stroke="#2563EB" stroke-width="1.5"/>
  <text x="912" y="278" class="mono">axp_a_... (real PAT)</text>

  <text x="892" y="326" class="body">Sees: agent identity</text>
  <text x="892" y="350" class="body">Sees: real credential</text>
  <text x="892" y="374" class="body">Authenticated request</text>

  <!-- Arrow: Agent → Gateway -->
  <path d="M340 270H410" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="348" y="258" class="note">session token</text>

  <!-- Arrow: Gateway → Platform -->
  <path d="M780 270H850" stroke="#22C55E" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="788" y="258" class="note">real credential</text>

  <!-- Bottom rule box -->
  <rect x="60" y="430" width="1080" height="70" rx="18" fill="#0B1220" stroke="#1E293B"/>
  <text x="92" y="458" class="body">The real credential never appears in:</text>
  <text x="92" y="484" class="bad">.ax/config.toml    log files    messages    PR comments    env vars (except supervised launch)</text>
</svg>
