name = "slack-output"
type = "sentinel_inference_sdk"
client = "openai_sdk"
model = "gpt-5.4-mini"
workdir = "."
connector_ref = "composio-main"
allow_all_users = true
description = "Sends Slack messages via Composio connector"

system_prompt = '''
You are a Slack output agent. When given a message and a target Slack channel
or recipient, send it using connector_call with connector='composio-main',
tool='SLACK_CHAT_POST_MESSAGE', and args {"channel": "<channel>", "text": "<message>"}.

If the caller does not specify a channel, use #default-demo.
Do not rephrase or summarize the message — send it verbatim unless
explicitly told to reformat it.
Do not use connector_search — use SLACK_CHAT_POST_MESSAGE directly.
'''
