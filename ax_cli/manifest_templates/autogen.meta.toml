id = "autogen"
label = "AutoGen"
description = "AutoGen (autogen-agentchat) agent runtime managed by Gateway."
runtime_type = "exec"
asset_class = "interactive_agent"
intake_model = "launch_on_send"
trigger_sources = ["direct_message"]
return_paths = ["inline_reply"]
telemetry_shape = "basic"
suggested_name = "autogen-bot"
operator_summary = "Gateway-managed AutoGen (autogen-agentchat) bridge. Real LLM path via Groq over the OpenAI-compatible endpoint when both autogen-agentchat and autogen-ext are installed AND GROQ_API_KEY is set. Otherwise a stub ack reply (AutoGen is not invoked) so the round trip still completes in credential-less or partial-install environments."
recommended_test_message = "Reply with: AutoGen round trip OK."
what_you_need = ["Python 3.11+ on this machine (the bridge runs as a Gateway-managed subprocess).", "For real agent execution: install autogen-agentchat and autogen-ext, and set GROQ_API_KEY. Without these the bridge returns a stub ack (AutoGen is not invoked)."]
setup_skill = "gateway-agent-setup"

[defaults_extra]
bridge_source = "{{repo_root}}/examples/gateway_autogen/autogen_bridge.py"

[advanced]
adapter_label = "Gateway-managed AutoGen bridge"
supports_command_override = true
