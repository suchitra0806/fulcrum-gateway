id = "pydantic_ai"
label = "Pydantic AI"
description = "Pydantic AI agent runtime managed by Gateway."
runtime_type = "exec"
asset_class = "interactive_agent"
intake_model = "launch_on_send"
trigger_sources = ["direct_message"]
return_paths = ["inline_reply"]
telemetry_shape = "basic"
suggested_name = "pydantic-ai-bot"
operator_summary = "Gateway-managed Pydantic AI bridge. Real LLM path via Groq over the OpenAI-compatible endpoint when pydantic-ai is installed AND GROQ_API_KEY is set. Otherwise a stub ack reply (Pydantic AI is not invoked) so the round trip still completes in credential-less or partial-install environments. V1 ships plain-text outputs; structured Pydantic-validated outputs are a follow-up."
recommended_test_message = "Reply with: Pydantic AI round trip OK."
what_you_need = ["Python 3.11+ on this machine (the bridge runs as a Gateway-managed subprocess).", "For real agent execution: install pydantic-ai and set GROQ_API_KEY. Without these the bridge returns a stub ack (Pydantic AI is not invoked)."]
setup_skill = "gateway-agent-setup"

[defaults_extra]
bridge_source = "{{repo_root}}/examples/gateway_pydantic_ai/pydantic_ai_bridge.py"

[advanced]
adapter_label = "Gateway-managed Pydantic AI bridge"
supports_command_override = true
