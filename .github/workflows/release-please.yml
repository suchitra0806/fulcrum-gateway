name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Validate release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            {
              echo "RELEASE_PLEASE_TOKEN is required."
              echo ""
              echo "Use a fine-grained bot PAT with repository Contents: write,"
              echo "Pull requests: write, and Issues: write permissions."
              echo "Do not rely on the default GITHUB_TOKEN for this repo."
            } >&2
            exit 1
          fi

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
