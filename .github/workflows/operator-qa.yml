name: Operator QA

on:
  workflow_call:
    inputs:
      envs:
        description: "Comma-separated environments to check, e.g. dev,next,prod"
        required: false
        type: string
        default: "dev,next"
      target:
        description: "Downstream target label, e.g. release, playwright, mcp-jam"
        required: false
        type: string
        default: "release"
      require_matrix:
        description: "Fail when no complete environment config is present"
        required: false
        type: boolean
        default: false
      artifact_name:
        description: "Uploaded artifact name"
        required: false
        type: string
        default: "operator-qa"
    secrets:
      AX_QA_DEV_TOKEN:
        required: false
      AX_QA_NEXT_TOKEN:
        required: false
      AX_QA_PROD_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      envs:
        description: "Comma-separated environments to check"
        required: false
        default: "dev,next"
      target:
        description: "Downstream target label"
        required: false
        default: "release"
      require_matrix:
        description: "Fail when no complete environment config is present"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  operator-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install axctl
        run: pip install -e ".[dev]"

      - name: Run operator QA sequence
        env:
          AX_QA_ENVS: ${{ inputs.envs || 'dev,next' }}
          AX_QA_TARGET: ${{ inputs.target || 'release' }}
          AX_QA_REQUIRE_MATRIX: ${{ inputs.require_matrix || false }}
          AX_QA_ARTIFACT_DIR: operator-qa-artifacts
          AX_QA_DEV_TOKEN: ${{ secrets.AX_QA_DEV_TOKEN }}
          AX_QA_DEV_BASE_URL: ${{ vars.AX_QA_DEV_BASE_URL }}
          AX_QA_DEV_SPACE_ID: ${{ vars.AX_QA_DEV_SPACE_ID }}
          AX_QA_NEXT_TOKEN: ${{ secrets.AX_QA_NEXT_TOKEN }}
          AX_QA_NEXT_BASE_URL: ${{ vars.AX_QA_NEXT_BASE_URL }}
          AX_QA_NEXT_SPACE_ID: ${{ vars.AX_QA_NEXT_SPACE_ID }}
          AX_QA_PROD_TOKEN: ${{ secrets.AX_QA_PROD_TOKEN }}
          AX_QA_PROD_BASE_URL: ${{ vars.AX_QA_PROD_BASE_URL }}
          AX_QA_PROD_SPACE_ID: ${{ vars.AX_QA_PROD_SPACE_ID }}
        run: |
          set +e
          python scripts/operator_qa_ci.py
          status=$?
          if [ "$status" -eq 3 ] && [ "$AX_QA_REQUIRE_MATRIX" != "true" ]; then
            echo "Operator QA skipped because no complete environment config was present."
            exit 0
          fi
          exit "$status"

      - name: Upload operator QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name || 'operator-qa' }}
          path: operator-qa-artifacts/
          if-no-files-found: ignore
