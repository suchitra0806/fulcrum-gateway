name: CI — Tests & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        # Floor is set to the actual current coverage (~9%) so any regression
        # below today's baseline fails CI. Raise this as new tests are added —
        # ideally back to 20% or higher once command modules are covered.
        # Real coverage today: ax_cli/token_cache.py 88%, ax_cli/config.py 46%,
        # ax_cli/client.py 32%, every commands/*.py at 0% (untested CLI surface).
        run: pytest tests/ --cov=ax_cli --cov-report=term-missing --cov-fail-under=9

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check ax_cli/

      - name: Ruff format check
        run: ruff format --check ax_cli/

  secrets:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for exposed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install package and pip-audit
        run: |
          pip install --upgrade pip setuptools
          pip install -e .
          pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --desc

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

  operator-qa-promotion:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/operator-qa.yml
    with:
      envs: ${{ vars.AX_QA_ENVS || 'dev,next' }}
      target: release
      require_matrix: false
      artifact_name: operator-qa-promotion
    secrets: inherit
