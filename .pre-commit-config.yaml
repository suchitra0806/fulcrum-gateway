# Pre-commit hooks for ax-cli — mirrors what CI runs so format/lint failures
# are caught before they reach a PR.
#
# CI runs (.github/workflows/ci.yml):
#   - pytest tests/ -v --tb=short
#   - pytest tests/ --cov=ax_cli --cov-report=term-missing --cov-fail-under=9
#   - ruff check ax_cli/
#   - ruff format --check ax_cli/
#   - python -m build
#   - twine check dist/*
#
# These hooks run the same gates locally. Ruff (lint + format) runs on every
# commit AND again on push; the heavier tests/build run on commit. If a commit
# or push would fail in CI, it fails locally first — no more red PRs from
# things that could have been caught here.
#
# Setup (one-time, per developer/agent):
#
#     pip install pre-commit   # or: pip install -e ".[dev]"
#     pre-commit install       # installs both the commit and push hooks
#
# Now `git commit` and `git push` run the hooks automatically. To run against all files
# without committing:
#
#     pre-commit run --all-files
#
# To skip hooks for a specific commit (use sparingly):
#
#     git commit --no-verify ...
#
# To update the hook versions to whatever's latest:
#
#     pre-commit autoupdate

# Install BOTH the commit-time and push-time hooks from a single
# `pre-commit install` (the default installs the pre-commit stage only).
default_install_hook_types: [pre-commit, pre-push]
# Hooks default to commit-time only, so the heavy ci-test-build below stays on
# commit and does not run on every push. Fast hooks opt into pre-push below.
default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin matches the local ruff version being used (0.15.15 as of 2026-06-16).
    # Bump with `pre-commit autoupdate` and verify CI still passes.
    rev: v0.15.15
    hooks:
      - id: ruff-check
        # Match CI scope: only ax_cli/ Python files. Other directories
        # (channel/, tests/, docs/) intentionally excluded — CI doesn't
        # check them either, so don't drift.
        files: ^ax_cli/.*\.py$
        # Run at commit AND push. The push gate catches changes that were
        # committed with --no-verify (or by tooling that bypassed the commit
        # hook) before they reach CI. Ruff is fast, so the redundancy is cheap.
        stages: [pre-commit, pre-push]
      - id: ruff-format
        files: ^ax_cli/.*\.py$
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: ci-test-build
        name: CI tests, coverage, build, and twine check
        entry: uv run --with build --with twine --with pytest-cov --with ruff==0.15.15 scripts/ci-check.sh
        language: system
        pass_filenames: false
        always_run: true
